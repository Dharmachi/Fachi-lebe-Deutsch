<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fachi 學德語</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA / iPhone 主屏幕 -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5b6cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fachi 學德語" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <header class="topbar">
    <button id="menu-btn" class="menu-btn" aria-label="菜单">☰</button>
    <div class="brand">
      <svg class="avatar" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fachi 卡通头像">
        <defs>
          <clipPath id="circ"><circle cx="60" cy="60" r="58"/></clipPath>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#e9f0f4"/>
            <stop offset="1" stop-color="#d2dfe7"/>
          </linearGradient>
        </defs>
        <g clip-path="url(#circ)">
          <rect width="120" height="120" fill="url(#sky)"/>
          <!-- 远山 + 树林 -->
          <path d="M-5 74 Q28 54 66 70 T125 66 L125 120 L-5 120 Z" fill="#a6cd84"/>
          <path d="M-5 86 Q40 72 82 84 T125 82 L125 120 L-5 120 Z" fill="#7fb663"/>
          <!-- 僧袍肩部 -->
          <path d="M24 120 L24 102 Q60 82 96 102 L96 120 Z" fill="#4a4a55"/>
          <!-- 脖子 -->
          <rect x="52" y="76" width="16" height="16" rx="6" fill="#e7b487"/>
          <!-- 交领 -->
          <path d="M50 88 L60 101 L70 88 L70 120 L50 120 Z" fill="#3c3c47"/>
          <path d="M60 101 L51 89 L55 86 L60 95 L65 86 L69 89 Z" fill="#33333d"/>
          <!-- 灰色围巾 + 流苏 -->
          <path d="M50 84 L45 120 L53 120 L57 90 Z" fill="#cdd3db"/>
          <path d="M70 84 L75 120 L67 120 L63 90 Z" fill="#cdd3db"/>
          <g stroke="#aab0bb" stroke-width="0.7" opacity="0.8">
            <path d="M48 90 L44 118"/><path d="M52 88 L49 118"/>
            <path d="M72 90 L76 118"/><path d="M68 88 L71 118"/>
          </g>
          <g stroke="#bcc2cb" stroke-width="1" stroke-linecap="round">
            <path d="M45 119 L44 124"/><path d="M48 119 L47 124"/><path d="M51 119 L50 124"/>
            <path d="M75 119 L76 124"/><path d="M72 119 L73 124"/><path d="M69 119 L70 124"/>
          </g>
          <!-- 头 -->
          <ellipse cx="60" cy="56" rx="22" ry="24" fill="#f3c69e"/>
          <!-- 剃度淡影 -->
          <path d="M40 48 Q60 28 80 48 Q60 42 40 48 Z" fill="#e3b083" opacity="0.8"/>
          <!-- 耳朵 -->
          <circle cx="38" cy="58" r="4" fill="#e7b487"/>
          <circle cx="82" cy="58" r="4" fill="#e7b487"/>
          <!-- 眉毛 -->
          <path d="M47 48 Q50.5 46 54 48" fill="none" stroke="#7a5436" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M66 48 Q69.5 46 73 48" fill="none" stroke="#7a5436" stroke-width="1.2" stroke-linecap="round"/>
          <!-- 细框圆眼镜 -->
          <g fill="none" stroke="#c9a23a" stroke-width="1.5">
            <rect x="43" y="52" width="14" height="11" rx="5"/>
            <rect x="63" y="52" width="14" height="11" rx="5"/>
            <path d="M57 57 L63 57"/>
            <path d="M43 56 L37 57"/><path d="M77 56 L83 57"/>
          </g>
          <!-- 笑眼 -->
          <path d="M47 59 Q50.5 56 54 59" fill="none" stroke="#5b3a22" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M66 59 Q69.5 56 73 59" fill="none" stroke="#5b3a22" stroke-width="1.5" stroke-linecap="round"/>
          <!-- 腮红 -->
          <circle cx="45" cy="67" r="3" fill="#f0a9a0" opacity="0.45"/>
          <circle cx="75" cy="67" r="3" fill="#f0a9a0" opacity="0.45"/>
          <!-- 灿烂笑容(露牙) -->
          <path d="M51 68 Q60 79 69 68 Q60 72 51 68 Z" fill="#fff"/>
          <path d="M51 68 Q60 78 69 68" fill="none" stroke="#9a5b3a" stroke-width="1.4" stroke-linecap="round"/>
        </g>
        <circle cx="60" cy="60" r="58" fill="none" stroke="#fff" stroke-width="3"/>
      </svg>
      <div>
        <h1 id="app-title">Fachi 學德語</h1>
        <p id="app-sub" class="muted"></p>
      </div>
    </div>
    <div class="score" id="score-box" title="本次答题正确率">
      <span id="score-correct">0</span>/<span id="score-total">0</span>
      <div class="score-bar"><div id="score-fill"></div></div>
    </div>
  </header>

  <div class="layout">
    <div id="nav-overlay" class="nav-overlay"></div>
    <!-- 左侧模块导航 -->
    <nav class="sidebar" id="module-nav"></nav>

    <main class="content">
      <!-- 模块标题 -->
      <div class="module-head" id="module-head"></div>

      <!-- 标签页(由 app.js 动态生成,语法模块/词汇库各一套) -->
      <div class="tabs" id="tabs"></div>

      <!-- 内容区 -->
      <section class="panel" id="panel"></section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
